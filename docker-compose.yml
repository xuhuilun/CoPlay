services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: coplay
      MYSQL_USER: coplay
      MYSQL_PASSWORD: coplay_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 4000
      WEB_ORIGIN: http://localhost
      WEB_ORIGINS: http://localhost,http://127.0.0.1
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: coplay
      MYSQL_USER: coplay
      MYSQL_PASSWORD: coplay_password
      DATABASE_URL: mysql://coplay:coplay_password@mysql:3306/coplay
      REDIS_URL: redis://redis:6379
      CDN_BASE_URL: https://cdn.bilisync.top
      PERSISTENCE_DRIVER: memory
      SOCKET_ADAPTER: memory
      RATE_LIMIT_MAX: 300
      RATE_LIMIT_WINDOW: 1 minute
    depends_on:
      - mysql
      - redis
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SOCKET_URL: ""
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mysql-data:
